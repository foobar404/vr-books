<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 VR Books</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.misc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    <script src="https://unpkg.com/aframe-log-component/dist/aframe-log-component.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="text/javascript" src="./js/libs/mixpanel.js"></script>

    <script src="./js/00-globals.js"></script>
    <script src="./js/01-multi-material.js"></script>
    <script src="./js/02-a-book.js"></script>
    <script src="./js/03-bookshelf.js"></script>
    <script src="./js/04-environment-controls.js"></script>
</head>

<body>
    <a-scene id="root">
        <a-assets>
            <img id="bookPages" src="./assets/images/bookPages.jpg">
            <img id="bookPages2" src="./assets/images/bookPages2.jpg">
            <img id="bookBack" src="./assets/images/bookBack.png">
            <img id="bookCover" src="./assets/images/bookCover.jpg">
        </a-assets>

        <!-- <a-entity log geometry="primitive: plane" material="color: #111" text="color: lightgreen" position="0 0 -1">
        </a-entity> -->

        <a-entity light="type: ambient; color: #fff; intensity: 0.4;"></a-entity>
        <a-entity id="env" environment="preset:forest; dressingAmount: 60" position="0 -2 0"></a-entity>

        <a-entity id="rig" look-controls wasd-controls position="0 0 0">
            <a-entity id="camera" camera></a-entity>
            <a-entity cursor raycaster="far: 1000; interval: 250; objects: [clickable]"></a-entity>
            <a-entity id="leftHand" hand-controls="hand: left" laser-controls="hand: left" super-hands
                raycaster="showLine: true; lineColor: red; objects: [clickable];" sphere-collider="objects: [clickable]"
                environment-controls></a-entity>
            <a-entity id="rightHand" hand-controls="hand: right" laser-controls="hand: right" super-hands
                raycaster="showLine: true; lineColor: red; objects: [clickable];" sphere-collider="objects: [clickable]"
                environment-controls></a-entity>
        </a-entity>

        <a-entity id="bookshelf" bookshelf></a-entity>
    </a-scene>
</body>

</html>
